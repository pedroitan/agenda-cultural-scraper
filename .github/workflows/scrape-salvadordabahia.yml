name: Scrape SalvadordaBahia.com — Agenda

on:
  schedule:
    # Roda 2x ao dia: 06:00 e 15:00 UTC (03:00 e 12:00 Brasília)
    - cron: '0 6 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  scrape-salvadordabahia:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run SalvadordaBahia scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_CITY: salvador
        run: npx tsx scripts/run-salvadordabahia.ts
