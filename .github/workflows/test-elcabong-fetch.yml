name: Test El Cabong Fetch (CI Diagnosis)

on:
  workflow_dispatch:

jobs:
  test-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner IP
        run: curl -s https://api.ipify.org && echo ""

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test - find when IP ban kicks in during clicking
        run: |
          node --input-type=module << 'SCRIPT'
          import { chromium } from 'playwright';

          const IMG_URL = 'https://elcabong.com.br/wp-content/uploads/2026/04/Mariella-by-Jaguar-Carvalho-2.jpg';
          const HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Referer': 'https://elcabong.com.br/',
            'Accept': 'image/webp,image/apng,image/*,*/*;q=0.8',
          };

          async function tryFetch(label) {
            const start = Date.now();
            try {
              const res = await fetch(IMG_URL, { headers: HEADERS, signal: AbortSignal.timeout(10000) });
              const buf = await res.arrayBuffer();
              console.log(`  ✅ ${label}: HTTP ${res.status}, ${(buf.byteLength/1024).toFixed(1)}KB in ${Date.now()-start}ms`);
              return true;
            } catch (err) {
              const cause = err?.cause?.code || err?.cause?.message || '';
              console.log(`  ❌ ${label}: ${err.message}${cause ? ' → ' + cause : ''} (${Date.now()-start}ms)`);
              return false;
            }
          }

          console.log('══ Goal: find after how many clicks fetch stops working ══\n');

          const browser = await chromium.launch({ headless: true, args: ['--no-sandbox'] });
          const page = await browser.newPage({ userAgent: HEADERS['User-Agent'] });
          await page.goto('https://elcabong.com.br/agenda/', { waitUntil: 'domcontentloaded', timeout: 30000 });
          await page.waitForTimeout(2000);

          // Test fetch before any clicks
          await tryFetch('after-page-load (0 clicks)');

          let blocked = false;
          for (let click = 1; click <= 40; click++) {
            const btn = page.locator('#load_more_events');
            if (await btn.count() === 0) { console.log(`  No more load-more button after ${click-1} clicks`); break; }
            const prev = await page.locator('.wpem-event-box-col').count();
            try { await btn.click({ timeout: 5000 }); } catch {
              await page.evaluate(() => { (document.querySelector('#load_more_events'))?.click(); });
            }
            await page.waitForTimeout(2000);
            const curr = await page.locator('.wpem-event-box-col').count();
            if (curr <= prev) { console.log(`  No new events after click ${click}`); break; }

            // Test fetch every 3 clicks
            if (click % 3 === 0) {
              const ok = await tryFetch(`after ${click} clicks (${curr} events)`);
              if (!ok && !blocked) {
                blocked = true;
                console.log(`\n🚫 IP BLOCKED after ${click} clicks (${curr} events)!\n`);
              }
            }
          }

          if (!blocked) console.log('\n✅ Fetch never blocked during clicking!');

          // ── KEY TEST: can page.evaluate(fetch) bypass the IP ban?
          console.log('\n══ page.evaluate(fetch) — reuses browser HTTP/2 connection ══');
          try {
            const result = await page.evaluate(async (url) => {
              try {
                const res = await fetch(url);
                if (!res.ok) return { ok: false, status: res.status, size: 0 };
                const buf = await res.arrayBuffer();
                return { ok: true, status: res.status, size: buf.byteLength };
              } catch (e) {
                return { ok: false, status: 0, size: 0, error: e.message };
              }
            }, IMG_URL);
            if (result.ok) {
              console.log(`  ✅ page.evaluate(fetch): HTTP ${result.status}, ${(result.size/1024).toFixed(1)}KB`);
            } else {
              console.log(`  ❌ page.evaluate(fetch): ${JSON.stringify(result)}`);
            }
          } catch (err) { console.log(`  ❌ page.evaluate error: ${err.message}`); }

          // Also test Node.js fetch to confirm it's still blocked
          console.log('\n══ Node.js fetch (control — should still be blocked) ══');
          await tryFetch('node-fetch-after-all-clicks');

          await browser.close();
          console.log('\n✅ Test complete.');
          SCRIPT
