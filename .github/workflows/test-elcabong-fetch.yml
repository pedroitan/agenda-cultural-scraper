name: Test El Cabong Fetch (CI Diagnosis)

on:
  workflow_dispatch:

jobs:
  test-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner IP
        run: curl -s https://api.ipify.org && echo ""

      - name: curl test (verbose headers)
        run: |
          curl -v --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://elcabong.com.br/" \
            -o /dev/null \
            "https://elcabong.com.br/wp-content/uploads/2026/04/Mariella-by-Jaguar-Carvalho-2.jpg" \
            2>&1 | head -60

      - name: curl test (direct, no headers)
        run: |
          curl -I --max-time 15 \
            "https://elcabong.com.br/wp-content/uploads/2026/04/Mariella-by-Jaguar-Carvalho-2.jpg" \
            2>&1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node.js fetch test
        run: |
          node --input-type=module << 'EOF'
          const url = 'https://elcabong.com.br/wp-content/uploads/2026/04/Mariella-by-Jaguar-Carvalho-2.jpg'
          const urls = [
            url,
            'https://elcabong.com.br/wp-content/uploads/2025/01/oz-favoritos.jpg',
            'https://elcabong.com.br/wp-content/uploads/2024/12/Leandro-Tigrao-2.jpg',
            'https://httpbin.org/image/jpeg', // baseline: known public image
          ]

          for (const u of urls) {
            const start = Date.now()
            try {
              const res = await fetch(u, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Referer': 'https://elcabong.com.br/',
                  'Accept': 'image/webp,image/apng,image/*,*/*;q=0.8',
                },
                signal: AbortSignal.timeout(15000),
              })
              const buf = await res.arrayBuffer()
              console.log(`✅ ${u.split('/').pop()} — HTTP ${res.status}, ${(buf.byteLength/1024).toFixed(1)}KB in ${Date.now()-start}ms`)
            } catch (err) {
              console.log(`❌ ${u.split('/').pop()} — ${err.name}: ${err.message} (${Date.now()-start}ms)`)
              if (err.cause) console.log(`   cause: ${err.cause}`)
            }
          }
          EOF
